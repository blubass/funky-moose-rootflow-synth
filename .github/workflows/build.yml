name: Build Plugins

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Release
            os: macos-14
            configure_cmd: cmake -S . -B build-ci -DCMAKE_BUILD_TYPE=Release -DROOTFLOW_COPY_PLUGIN_AFTER_BUILD=OFF
            build_cmd: cmake --build build-ci --parallel
            artifact_name: funky-moose-rootflow-synth-macos
          - name: Windows Release
            os: windows-2022
            configure_cmd: cmake -S . -B build-ci -A x64 -DROOTFLOW_COPY_PLUGIN_AFTER_BUILD=OFF
            build_cmd: cmake --build build-ci --config Release --parallel
            artifact_name: funky-moose-rootflow-synth-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch JUCE 8.0.10
        shell: bash
        run: |
          git clone --depth 1 --branch 8.0.10 https://github.com/juce-framework/JUCE.git external/JUCE

      - name: Configure
        shell: bash
        run: ${{ matrix.configure_cmd }}

      - name: Build
        shell: bash
        run: ${{ matrix.build_cmd }}

      - name: Stage macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          find build-ci -type d \( \
            -name "Funky Moose Rootflow Synth.component" -o \
            -name "Funky Moose Rootflow Synth.vst3" -o \
            -name "Funky Moose Rootflow Synth.app" \
          \) -exec cp -R "{}" dist/ \;
          ls -la dist

      - name: Stage Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $vst3Dir = Join-Path 'build-ci' 'RootFlow_artefacts/Release/VST3'
          $standaloneDir = Join-Path 'build-ci' 'RootFlow_artefacts/Release/Standalone'

          if (Test-Path $vst3Dir) {
            Get-ChildItem -Path $vst3Dir -Directory -Filter '*.vst3' | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination dist -Recurse -Force
            }
          }

          if (Test-Path $standaloneDir) {
            Get-ChildItem -Path $standaloneDir -File -Filter '*.exe' | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination dist -Force
            }
          }

          $stagedArtifacts = Get-ChildItem -Path dist -Recurse -Force
          if (-not $stagedArtifacts) {
            throw 'No Windows artifacts were staged from build-ci/RootFlow_artefacts/Release.'
          }

          $stagedArtifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist
          if-no-files-found: error

  release:
    name: Publish Release Assets
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - name: Download artifact archives
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          gh api "repos/${GH_REPO}/actions/runs/${{ github.run_id }}/artifacts" \
            --paginate \
            --jq '.artifacts[] | [.id, .name] | @tsv' |
          while IFS=$'\t' read -r artifact_id artifact_name; do
            case "${artifact_name}" in
              funky-moose-rootflow-synth-macos)
                asset_path="release-assets/funky-moose-rootflow-synth-${TAG_NAME}-macos.zip"
                ;;
              funky-moose-rootflow-synth-windows)
                asset_path="release-assets/funky-moose-rootflow-synth-${TAG_NAME}-windows.zip"
                ;;
              *)
                continue
                ;;
            esac

            gh api "repos/${GH_REPO}/actions/artifacts/${artifact_id}/zip" > "${asset_path}"
          done

          test -s "release-assets/funky-moose-rootflow-synth-${TAG_NAME}-macos.zip"
          test -s "release-assets/funky-moose-rootflow-synth-${TAG_NAME}-windows.zip"
          ls -lh release-assets

      - name: Create release if missing
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists."
            exit 0
          fi

          gh release create "${TAG_NAME}" \
            --verify-tag \
            --title "Funky Moose Rootflow Synth ${TAG_NAME}" \
            --generate-notes

      - name: Upload release assets
        shell: bash
        run: |
          set -euo pipefail

          gh release upload "${TAG_NAME}" \
            "release-assets/funky-moose-rootflow-synth-${TAG_NAME}-macos.zip" \
            "release-assets/funky-moose-rootflow-synth-${TAG_NAME}-windows.zip" \
            --clobber
